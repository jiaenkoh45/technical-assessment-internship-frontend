<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Task 1 here -->
    <nav class="navbar navbar-expand-md bg-body-tertiary fixed-top">
        <div class="container-fluid my-2">
            <a class="navbar-brand" href="#">Logo</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- Task 2 here -->
    <section id="cards" class="container my-5 pt-4">
        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="card overflow-hidden">
                    <div class="ratio ratio-21x9">
                        <img src="card1.png" class="card-img-top object-fit-cover" alt="Card 1">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Card 1</h5>
                        <p class="card-text">Description: Card 1</p>
                        <a href="#" class="btn btn-primary">Details</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card overflow-hidden">
                    <div class="ratio ratio-21x9">
                        <img src="card2.png" class="card-img-top object-fit-cover" alt="Card 1">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Card 2</h5>
                        <p class="card-text">Description: Card 2</p>
                        <a href="#" class="btn btn-primary">Details</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card overflow-hidden">
                    <div class="ratio ratio-21x9">
                        <img src="card3.png" class="card-img-top object-fit-cover" alt="Card 1">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Card 3</h5>
                        <p class="card-text">Description: Card 3</p>
                        <a href="#" class="btn btn-primary">Details</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Task 3 here -->
    <section id="contact" class="container my-5">
        <h2 class="mb-4">Contact Us</h2>
        <form id="contactForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Your Name" required>
                <label for="name">Name</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Your Email" required>
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-3">
                <textarea class="form-control" id="message" placeholder="Your Message" style="height: 150px"
                    required></textarea>
                <label for="message">Message</label>
            </div>
            <button type="button" class="btn btn-primary" id="submitBtn">Submit</button>
        </form>
    </section>

    <!-- Task 4: Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">Your Submission</h5>
                </div>
                <div class="modal-body">
                    <p>Name: <span id="modalName"></span></p>
                    <p>Email:<span id="modalEmail"></span></p>
                    <p>Message:<span id="modalMessage"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', function () {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            // Basic validation — don't open modal if fields are empty
            if (!name || !email || !message) {
                document.getElementById('contactForm').reportValidity();
                return;
            }

            // Populate modal with form values
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalEmail').textContent = email;
            document.getElementById('modalMessage').textContent = message;

            // Show the modal
            const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            modal.show();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
